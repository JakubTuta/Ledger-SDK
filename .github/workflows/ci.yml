name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: python

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install ruff
        run: python -m pip install --upgrade pip "ruff>=0.1.0"

      - name: ruff format (auto-fix pass)
        run: ruff format .

      - name: ruff check --fix (auto-fix pass)
        run: ruff check --fix .

      - name: ruff check (non-fixing gate)
        run: ruff check .

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Sanity-check the built wheel installs and imports
        run: |
          python -m venv /tmp/ledger-sdk-build-check
          /tmp/ledger-sdk-build-check/bin/pip install --upgrade pip
          /tmp/ledger-sdk-build-check/bin/pip install dist/*.whl
          /tmp/ledger-sdk-build-check/bin/python -c "import ledger; print(ledger.__file__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/*

  # ==================== Version-commit detection ====================
  # A push whose commit subject starts with "vX.Y.Z" (e.g. "v2.0.0. new
  # version") triggers a release. This job runs unconditionally (cheap) so
  # the `release` job below can gate on its output without every push
  # spinning up a runner just to decide not to release.
  version-check:
    name: Detect version commit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(fromJSON('["main", "master"]'), github.ref_name)
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      title: ${{ steps.check.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check commit message for version prefix
        id: check
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          SUBJECT="$(head -n1 <<< "$COMMIT_MESSAGE")"
          if [[ "$SUBJECT" =~ ^v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "title=$SUBJECT" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ==================== Release: GitHub release + PyPI publish ====================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, build, version-check]
    if: needs.version-check.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: python/dist

      - name: Extract changelog section for this version
        id: notes
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG.md section found for [$VERSION]" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.version-check.outputs.version }}" \
            --title "${{ needs.version-check.outputs.title }}" \
            --notes-file RELEASE_NOTES.md \
            --target "${{ github.sha }}" \
            dist/*

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*
          twine upload dist/*
